name: Sync Client Docs to Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout client-docs
        uses: actions/checkout@v4

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: ZaedTonmoy/eidoncore-website
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          path: website

      - name: Build docs.json
        run: |
          chmod +x website/build-docs.sh
          website/build-docs.sh "${{ github.workspace }}"

      - name: Commit and push
        working-directory: website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/docs.json
          if git diff --staged --quiet; then
            echo "No changes to docs.json"
          else
            git commit -m "chore: sync docs from client-docs [automated]"
            git push
          fi
